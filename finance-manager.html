<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finance Manager">
    <title>💰 Finance Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }
        
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        .header {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 24px;
            font-weight: bold;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
        }
        
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #0f172a;
        }
        
        .balance-label {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 8px;
        }
        
        .balance-amount {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .stats-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            font-size: 14px;
            font-weight: 500;
        }
        
        .stat-value {
            font-size: 14px;
            font-weight: 600;
        }
        
        .income { color: #22c55e; }
        .expense { color: #ef4444; }
        
        .row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .row > div {
            flex: 1;
        }
        
        .button {
            background: #e2e8f0;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
            transition: background 0.2s;
        }
        
        .button:active {
            opacity: 0.8;
        }
        
        .button.primary {
            background: #2563eb;
            color: white;
        }
        
        .button.expense-btn {
            background: #fecaca;
        }
        
        .button.income-btn {
            background: #bbf7d0;
        }
        
        .button-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .button-row .button {
            flex: 1;
            margin-bottom: 0;
        }
        
        .input {
            width: 100%;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            margin-bottom: 8px;
            font-family: inherit;
        }
        
        .input.large {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            padding: 16px;
        }
        
        .category-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .category-btn.active {
            background: #dbeafe;
            border: 2px solid #2563eb;
        }
        
        .transaction-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .transaction-info {
            flex: 1;
        }
        
        .transaction-name {
            font-size: 14px;
            font-weight: 600;
            color: #0f172a;
        }
        
        .transaction-date {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 2px;
        }
        
        .transaction-amount {
            font-weight: 600;
            margin-right: 8px;
        }
        
        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            padding-bottom: 8px;
        }
        
        .nav-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            text-align: center;
            flex: 1;
        }
        
        .nav-btn.active {
            background: #eff6ff;
        }
        
        .nav-icon {
            font-size: 20px;
        }
        
        .nav-label {
            font-size: 10px;
            color: #64748b;
            margin-top: 4px;
        }
        
        .nav-btn.active .nav-label {
            color: #2563eb;
            font-weight: 600;
        }
        
        .hidden {
            display: none;
        }
        
        .datetime-row {
            display: flex;
            gap: 8px;
        }
        
        .datetime-row input {
            flex: 1;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #0f172a;
            margin-bottom: 12px;
            margin-top: 20px;
        }
        
        .section-title:first-child {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">💰 Finance Manager</div>
        
        <div class="content">
            <!-- Dashboard -->
            <div id="dashboard" class="section">
                <div class="card">
                    <div class="balance-label">БАЛАНС</div>
                    <div class="balance-amount" id="balance" style="color: #22c55e;">0 ₸</div>
                    <div style="height: 1px; background: #e2e8f0; margin: 12px 0;"></div>
                    <div class="balance-label">в том числе:</div>
                    <div class="stats-row">
                        <span>💳 Kaspi:</span>
                        <span id="kaspi-balance">0 ₸</span>
                    </div>
                    <div class="stats-row">
                        <span>💵 Наличные:</span>
                        <span id="cash-balance">0 ₸</span>
                    </div>
                </div>
                
                <div class="row">
                    <div class="card">
                        <div class="balance-label" style="color: #22c55e;">ДОХОД</div>
                        <div class="balance-amount income" id="income">0 ₸</div>
                    </div>
                    <div class="card">
                        <div class="balance-label" style="color: #ef4444;">РАСХОД</div>
                        <div class="balance-amount expense" id="expense">0 ₸</div>
                    </div>
                </div>
            </div>
            
            <!-- Add Transaction -->
            <div id="add" class="section hidden">
                <div id="typeSelect" class="card">
                    <div class="title">Выбери тип операции</div>
                    <button class="button expense-btn" onclick="startAdd('expense')">💸 Расход</button>
                    <button class="button income-btn" onclick="startAdd('income')">💰 Доход</button>
                </div>
                
                <div id="nameStep" class="card hidden">
                    <div class="title">Наименование</div>
                    <input type="text" id="nameInput" class="input" placeholder="Например: Продукты">
                    <div class="button-row">
                        <button class="button" onclick="prevStep()">← Назад</button>
                        <button class="button primary" onclick="nextStep()">Далее →</button>
                    </div>
                </div>
                
                <div id="categoryStep" class="card hidden">
                    <div class="title">Категория</div>
                    <div id="categoryButtons"></div>
                    <div class="button-row">
                        <button class="button" onclick="prevStep()">← Назад</button>
                        <button class="button primary" onclick="nextStep()">Далее →</button>
                    </div>
                </div>
                
                <div id="amountStep" class="card hidden">
                    <div class="title">Сумма</div>
                    <input type="text" id="amountInput" class="input large" placeholder="0" inputmode="decimal">
                    <div class="button-row">
                        <button class="button" onclick="prevStep()">← Назад</button>
                        <button class="button primary" onclick="nextStep()">Далее →</button>
                    </div>
                </div>
                
                <div id="paymentStep" class="card hidden">
                    <div class="title">Способ платежа</div>
                    <button class="button" id="kaspiBtn" onclick="selectPayment('Kaspi')">💳 Kaspi</button>
                    <button class="button" id="cashBtn" onclick="selectPayment('Наличные')">💵 Наличные</button>
                    <div class="button-row">
                        <button class="button" onclick="prevStep()">← Назад</button>
                        <button class="button primary" onclick="nextStep()">Далее →</button>
                    </div>
                </div>
                
                <div id="datetimeStep" class="card hidden">
                    <div class="title">Дата и время</div>
                    <div class="datetime-row">
                        <input type="date" id="dateInput" class="input">
                        <input type="time" id="timeInput" class="input">
                    </div>
                    <div class="button-row">
                        <button class="button" onclick="prevStep()">← Назад</button>
                        <button class="button primary" onclick="saveTransaction()">✓ Сохранить</button>
                    </div>
                </div>
            </div>
            
            <!-- History -->
            <div id="history" class="section hidden">
                <div class="section-title">💚 Доходы</div>
                <div id="incomeList"></div>
                
                <div class="section-title">❤️ Расходы</div>
                <div id="expenseList"></div>
            </div>
            
            <!-- Analytics -->
            <div id="analytics" class="section hidden">
                <div class="card">
                    <div class="title">📊 Статистика</div>
                    <div class="stats-row">
                        <span>Доход:</span>
                        <span class="income" id="analyticsIncome">0 ₸</span>
                    </div>
                    <div class="stats-row">
                        <span>Расход:</span>
                        <span class="expense" id="analyticsExpense">0 ₸</span>
                    </div>
                    <div class="stats-row" style="border-bottom: none; padding-top: 12px;">
                        <span style="font-weight: 600;">Баланс:</span>
                        <span id="analyticsBalance" style="font-weight: 600; color: #22c55e;">0 ₸</span>
                    </div>
                </div>
                
                <div class="card">
                    <div class="title">🥧 По категориям</div>
                    <div id="categoryStats"></div>
                </div>
            </div>
        </div>
        
        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-btn active" onclick="switchTab('dashboard')">
                <div class="nav-icon">📊</div>
                <div class="nav-label">Главная</div>
            </button>
            <button class="nav-btn" onclick="switchTab('add')">
                <div class="nav-icon">➕</div>
                <div class="nav-label">Добавить</div>
            </button>
            <button class="nav-btn" onclick="switchTab('history')">
                <div class="nav-icon">📜</div>
                <div class="nav-label">История</div>
            </button>
            <button class="nav-btn" onclick="switchTab('analytics')">
                <div class="nav-icon">📈</div>
                <div class="nav-label">Аналитика</div>
            </button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'finance_transactions';
        let transactions = [];
        let currentStep = null;
        let formData = {
            type: 'expense',
            name: '',
            category: 'Другое',
            amount: '',
            paymentType: 'Наличные',
            date: new Date().toISOString().split('T')[0],
            time: new Date().toTimeString().slice(0, 5),
        };
        
        const categories = ['Продукты', 'Развлечение', 'Автомобиль', 'Здоровье', 'Другое'];
        
        // Load data
        function loadData() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) transactions = JSON.parse(data);
            updateDashboard();
        }
        
        // Save data
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
            updateDashboard();
        }
        
        // Add transaction
        function saveTransaction() {
            const newTx = {
                id: Date.now(),
                ...formData,
                amount: parseFloat(formData.amount),
                timestamp: `${formData.date} ${formData.time} GMT+5`,
            };
            transactions.push(newTx);
            saveData();
            alert('✅ ' + (formData.type === 'expense' ? 'Расход' : 'Доход') + ' записан!');
            resetForm();
            switchTab('dashboard');
        }
        
        // Delete transaction
        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
            renderHistory();
        }
        
        // Reset form
        function resetForm() {
            formData = {
                type: 'expense',
                name: '',
                category: 'Другое',
                amount: '',
                paymentType: 'Наличные',
                date: new Date().toISOString().split('T')[0],
                time: new Date().toTimeString().slice(0, 5),
            };
            currentStep = null;
            document.getElementById('typeSelect').classList.remove('hidden');
            document.getElementById('nameStep').classList.add('hidden');
            document.getElementById('categoryStep').classList.add('hidden');
            document.getElementById('amountStep').classList.add('hidden');
            document.getElementById('paymentStep').classList.add('hidden');
            document.getElementById('datetimeStep').classList.add('hidden');
        }
        
        // Form steps
        function startAdd(type) {
            formData.type = type;
            document.getElementById('typeSelect').classList.add('hidden');
            document.getElementById('nameStep').classList.remove('hidden');
            document.getElementById('nameInput').focus();
        }
        
        function nextStep() {
            if (currentStep === null) {
                formData.name = document.getElementById('nameInput').value;
                if (!formData.name) { alert('Введи наименование'); return; }
                currentStep = 'category';
            } else if (currentStep === 'category') {
                currentStep = 'amount';
            } else if (currentStep === 'amount') {
                formData.amount = document.getElementById('amountInput').value;
                if (!formData.amount) { alert('Введи сумму'); return; }
                currentStep = 'payment';
            } else if (currentStep === 'payment') {
                currentStep = 'datetime';
            }
            renderFormStep();
        }
        
        function prevStep() {
            if (currentStep === 'category') currentStep = null;
            else if (currentStep === 'amount') currentStep = 'category';
            else if (currentStep === 'payment') currentStep = 'amount';
            else if (currentStep === 'datetime') currentStep = 'payment';
            renderFormStep();
        }
        
        function selectPayment(type) {
            formData.paymentType = type;
            renderFormStep();
        }
        
        function renderFormStep() {
            document.getElementById('nameStep').classList.add('hidden');
            document.getElementById('categoryStep').classList.add('hidden');
            document.getElementById('amountStep').classList.add('hidden');
            document.getElementById('paymentStep').classList.add('hidden');
            document.getElementById('datetimeStep').classList.add('hidden');
            document.getElementById('typeSelect').classList.add('hidden');
            
            if (currentStep === null) {
                document.getElementById('typeSelect').classList.remove('hidden');
            } else if (currentStep === 'category') {
                document.getElementById('categoryStep').classList.remove('hidden');
                renderCategories();
            } else if (currentStep === 'amount') {
                document.getElementById('amountStep').classList.remove('hidden');
                document.getElementById('amountInput').focus();
            } else if (currentStep === 'payment') {
                document.getElementById('paymentStep').classList.remove('hidden');
                document.getElementById('kaspiBtn').style.background = formData.paymentType === 'Kaspi' ? '#dbeafe' : '';
                document.getElementById('cashBtn').style.background = formData.paymentType === 'Наличные' ? '#dbeafe' : '';
            } else if (currentStep === 'datetime') {
                document.getElementById('datetimeStep').classList.remove('hidden');
                document.getElementById('dateInput').value = formData.date;
                document.getElementById('timeInput').value = formData.time;
            }
        }
        
        function renderCategories() {
            const container = document.getElementById('categoryButtons');
            container.innerHTML = categories.map(cat => `
                <button class="category-btn ${formData.category === cat ? 'active' : ''}" 
                    onclick="formData.category='${cat}'; renderCategories()">
                    ${cat}
                </button>
            `).join('');
        }
        
        // Update dashboard
        function updateDashboard() {
            let income = 0, expense = 0;
            let kaspiBalance = 0, cashBalance = 0;
            
            transactions.forEach(t => {
                const amount = t.type === 'income' ? t.amount : -t.amount;
                if (t.type === 'income') income += t.amount;
                else expense += t.amount;
                
                if (t.paymentType === 'Kaspi') kaspiBalance += amount;
                else cashBalance += amount;
            });
            
            const balance = income - expense;
            document.getElementById('balance').textContent = balance.toLocaleString('ru-RU') + ' ₸';
            document.getElementById('balance').style.color = balance >= 0 ? '#22c55e' : '#ef4444';
            document.getElementById('income').textContent = income.toLocaleString('ru-RU') + ' ₸';
            document.getElementById('expense').textContent = expense.toLocaleString('ru-RU') + ' ₸';
            document.getElementById('kaspi-balance').textContent = kaspiBalance.toLocaleString('ru-RU') + ' ₸';
            document.getElementById('cash-balance').textContent = cashBalance.toLocaleString('ru-RU') + ' ₸';
            
            document.getElementById('analyticsIncome').textContent = income.toLocaleString('ru-RU') + ' ₸';
            document.getElementById('analyticsExpense').textContent = expense.toLocaleString('ru-RU') + ' ₸';
            document.getElementById('analyticsBalance').textContent = balance.toLocaleString('ru-RU') + ' ₸';
            document.getElementById('analyticsBalance').style.color = balance >= 0 ? '#22c55e' : '#ef4444';
            
            renderCategoryStats();
            renderHistory();
        }
        
        function renderCategoryStats() {
            const stats = {};
            transactions.filter(t => t.type === 'expense').forEach(t => {
                stats[t.category] = (stats[t.category] || 0) + t.amount;
            });
            
            const html = Object.entries(stats).map(([cat, val]) => `
                <div class="stats-row">
                    <span>${cat}</span>
                    <span style="font-weight: 600;">${val.toLocaleString('ru-RU')} ₸</span>
                </div>
            `).join('');
            
            document.getElementById('categoryStats').innerHTML = html;
        }
        
        function renderHistory() {
            const income = transactions.filter(t => t.type === 'income');
            const expense = transactions.filter(t => t.type === 'expense');
            
            document.getElementById('incomeList').innerHTML = income.map(t => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-name">${t.name}</div>
                        <div class="transaction-date">${t.date}</div>
                    </div>
                    <div class="transaction-amount income">${t.amount.toLocaleString('ru-RU')} ₸</div>
                    <button class="delete-btn" onclick="deleteTransaction(${t.id})">✕</button>
                </div>
            `).join('');
            
            document.getElementById('expenseList').innerHTML = expense.map(t => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-name">${t.name}</div>
                        <div class="transaction-date">${t.category} • ${t.date}</div>
                    </div>
                    <div class="transaction-amount expense">${t.amount.toLocaleString('ru-RU')} ₸</div>
                    <button class="delete-btn" onclick="deleteTransaction(${t.id})">✕</button>
                </div>
            `).join('');
        }
        
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach((btn, i) => {
                const tabs = ['dashboard', 'add', 'history', 'analytics'];
                btn.classList.toggle('active', tabs[i] === tab);
            });
            
            if (tab === 'add') resetForm();
        }
        
        // Init
        window.addEventListener('load', loadData);
        
        // Initialize date/time inputs
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
            document.getElementById('timeInput').value = new Date().toTimeString().slice(0, 5);
        });
    </script>
</body>
</html>
