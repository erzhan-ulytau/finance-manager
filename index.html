<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Finance Manager v4</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function FinanceManager() {
      const [transactions, setTransactions] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem('fm_tx') || '[]');
        } catch {
          return [];
        }
      });

      const [wallets, setWallets] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem('fm_wallets') || JSON.stringify([
            { id: 'kaspi', name: '💳 Kaspi' },
            { id: 'cash', name: '💵 Наличные' },
            { id: 'halyk', name: '🏦 Halyk' }
          ]));
        } catch {
          return [
            { id: 'kaspi', name: '💳 Kaspi' },
            { id: 'cash', name: '💵 Наличные' },
            { id: 'halyk', name: '🏦 Halyk' }
          ];
        }
      });

      const [categories] = useState(['АЗС', 'Расходники', 'Аренда', 'Продукты', 'Другое']);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [showAddForm, setShowAddForm] = useState(false);
      const [formType, setFormType] = useState(null);
      const [formData, setFormData] = useState({
        name: '',
        amount: '',
        category: 'Другое',
        wallet: '💳 Kaspi',
        date: new Date().toISOString().split('T')[0],
        comment: ''
      });

      const [showAddWallet, setShowAddWallet] = useState(false);
      const [newWalletName, setNewWalletName] = useState('');
      const [showTransfer, setShowTransfer] = useState(false);
      const [transfer, setTransfer] = useState({ from: '', to: '', amount: '' });

      useEffect(() => {
        localStorage.setItem('fm_tx', JSON.stringify(transactions));
      }, [transactions]);

      useEffect(() => {
        localStorage.setItem('fm_wallets', JSON.stringify(wallets));
      }, [wallets]);

      const formatNumber = (num) => {
        return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
      };

      const totalBalance = transactions.reduce((sum, t) => 
        sum + (t.type === 'income' ? t.amount : -t.amount), 0
      );

      const getWalletBalance = (walletName) => {
        return transactions
          .filter(t => t.wallet === walletName)
          .reduce((sum, t) => sum + (t.type === 'income' ? t.amount : -t.amount), 0);
      };

      const addTransaction = () => {
        if (!formData.name || !formData.amount) {
          alert('Заполни все поля');
          return;
        }

        setTransactions([...transactions, {
          id: Date.now(),
          type: formType,
          name: formData.name,
          amount: parseFloat(formData.amount),
          category: formType === 'expense' ? formData.category : 'Доход',
          wallet: formData.wallet,
          date: formData.date,
          comment: formData.comment
        }]);

        setFormData({ name: '', amount: '', category: 'Другое', wallet: '💳 Kaspi', date: new Date().toISOString().split('T')[0], comment: '' });
        setShowAddForm(false);
        setFormType(null);
      };

      const addWallet = () => {
        if (!newWalletName.trim()) return;
        setWallets([...wallets, { id: Date.now().toString(), name: newWalletName }]);
        setNewWalletName('');
        setShowAddWallet(false);
      };

      const makeTransfer = () => {
        if (!transfer.from || !transfer.to || !transfer.amount) {
          alert('Заполни все поля');
          return;
        }

        const fromWallet = wallets.find(w => w.id === transfer.from)?.name;
        const toWallet = wallets.find(w => w.id === transfer.to)?.name;
        const amount = parseFloat(transfer.amount);

        setTransactions([...transactions, 
          { id: Date.now(), type: 'expense', name: `Перевод на ${toWallet}`, amount, category: 'Другое', wallet: fromWallet, date: new Date().toISOString().split('T')[0], comment: 'Перевод' },
          { id: Date.now() + 1, type: 'income', name: `Получено с ${fromWallet}`, amount, category: 'Другое', wallet: toWallet, date: new Date().toISOString().split('T')[0], comment: 'Перевод' }
        ]);

        setTransfer({ from: '', to: '', amount: '' });
        setShowTransfer(false);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 pb-24">
          {/* ГЛАВНАЯ */}
          {activeTab === 'dashboard' && (
            <div className="p-4 max-w-2xl mx-auto">
              <div className="bg-white rounded-xl p-6 border border-slate-200 shadow-sm mb-4">
                <p className="text-sm font-semibold text-slate-600 mb-2">💰 БАЛАНС</p>
                <p className="text-4xl font-bold text-green-600">{formatNumber(totalBalance)} ₸</p>
              </div>

              <div className="grid grid-cols-2 gap-3">
                <button onClick={() => { setShowAddForm(true); setFormType(null); }} className="bg-blue-600 text-white py-4 rounded-lg font-semibold">➕ Добавить</button>
                <button onClick={() => setActiveTab('wallets')} className="bg-purple-600 text-white py-4 rounded-lg font-semibold">💳 Кошельки</button>
                <button onClick={() => setActiveTab('history')} className="bg-orange-600 text-white py-4 rounded-lg font-semibold">📜 История</button>
                <button onClick={() => setActiveTab('analytics')} className="bg-green-600 text-white py-4 rounded-lg font-semibold">📊 Аналитика</button>
              </div>
            </div>
          )}

          {/* КОШЕЛЬКИ */}
          {activeTab === 'wallets' && (
            <div className="p-4 max-w-2xl mx-auto">
              <h2 className="text-2xl font-bold mb-4">💳 Кошельки</h2>
              <div className="grid grid-cols-2 gap-3 mb-4">
                {wallets.map(w => (
                  <div key={w.id} className="bg-white rounded-lg p-4 border border-slate-200">
                    <p className="text-sm text-slate-600">{w.name}</p>
                    <p className="text-2xl font-bold text-slate-900">{formatNumber(getWalletBalance(w.name))} ₸</p>
                  </div>
                ))}
              </div>

              <button onClick={() => setShowAddWallet(true)} className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold mb-3">➕ Добавить кошелек</button>

              {showAddWallet && (
                <div className="bg-white rounded-lg p-4 border border-slate-200 mb-3">
                  <input type="text" value={newWalletName} onChange={(e) => setNewWalletName(e.target.value)} placeholder="Название" className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-3 outline-none" />
                  <div className="flex gap-2">
                    <button onClick={addWallet} className="flex-1 bg-green-600 text-white py-2 rounded-lg">✓</button>
                    <button onClick={() => setShowAddWallet(false)} className="flex-1 bg-slate-300 py-2 rounded-lg">✕</button>
                  </div>
                </div>
              )}

              <button onClick={() => setShowTransfer(true)} className="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold">➡️ Перевод между кошельками</button>

              {showTransfer && (
                <div className="bg-white rounded-lg p-4 border border-slate-200 mt-3">
                  <select value={transfer.from} onChange={(e) => setTransfer({...transfer, from: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-2 outline-none">
                    <option value="">От кошелька:</option>
                    {wallets.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}
                  </select>
                  <select value={transfer.to} onChange={(e) => setTransfer({...transfer, to: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-2 outline-none">
                    <option value="">На кошелек:</option>
                    {wallets.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}
                  </select>
                  <input type="number" value={transfer.amount} onChange={(e) => setTransfer({...transfer, amount: e.target.value})} placeholder="Сумма ₸" className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-3 outline-none" />
                  <div className="flex gap-2">
                    <button onClick={makeTransfer} className="flex-1 bg-purple-600 text-white py-2 rounded-lg font-semibold">✓ Перевести</button>
                    <button onClick={() => setShowTransfer(false)} className="flex-1 bg-slate-300 py-2 rounded-lg">✕</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ИСТОРИЯ */}
          {activeTab === 'history' && (
            <div className="p-4 max-w-2xl mx-auto">
              <h2 className="text-2xl font-bold mb-4">📜 История</h2>
              {transactions.length === 0 ? (
                <p className="text-center text-slate-500 py-8">Нет операций</p>
              ) : (
                transactions.slice().reverse().map(t => (
                  <div key={t.id} className="bg-white rounded-lg p-4 border border-slate-200 mb-3">
                    <div className="flex justify-between">
                      <div>
                        <p className="font-semibold">{t.name}</p>
                        <p className="text-sm text-slate-600">{t.category} • {t.wallet}</p>
                      </div>
                      <p className={`font-bold text-lg ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}`}>
                        {t.type === 'income' ? '+' : '-'}{formatNumber(t.amount)} ₸
                      </p>
                    </div>
                  </div>
                ))
              )}
            </div>
          )}

          {/* АНАЛИТИКА */}
          {activeTab === 'analytics' && (
            <div className="p-4 max-w-2xl mx-auto">
              <h2 className="text-2xl font-bold mb-4">📊 Аналитика</h2>
              <div className="grid grid-cols-3 gap-3">
                <div className="bg-green-50 rounded-lg p-4 text-center border border-green-200">
                  <p className="text-sm text-slate-600">Доход</p>
                  <p className="text-lg font-bold text-green-600">{formatNumber(transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0))} ₸</p>
                </div>
                <div className="bg-red-50 rounded-lg p-4 text-center border border-red-200">
                  <p className="text-sm text-slate-600">Расход</p>
                  <p className="text-lg font-bold text-red-600">{formatNumber(transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0))} ₸</p>
                </div>
                <div className="bg-blue-50 rounded-lg p-4 text-center border border-blue-200">
                  <p className="text-sm text-slate-600">Баланс</p>
                  <p className="text-lg font-bold text-blue-600">{formatNumber(totalBalance)} ₸</p>
                </div>
              </div>
            </div>
          )}

          {/* ФОРМА ДОБАВЛЕНИЯ */}
          {showAddForm && !formType && (
            <div className="fixed inset-0 bg-black/30 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl p-6 max-w-md w-full">
                <h3 className="text-xl font-bold mb-4">Выбери тип</h3>
                <button onClick={() => setFormType('expense')} className="w-full bg-red-100 text-red-700 py-4 rounded-lg font-bold text-lg mb-2">💸 Расход</button>
                <button onClick={() => setFormType('income')} className="w-full bg-green-100 text-green-700 py-4 rounded-lg font-bold text-lg mb-2">💰 Доход</button>
                <button onClick={() => { setShowAddForm(false); setFormType(null); }} className="w-full bg-slate-300 text-slate-700 py-2 rounded-lg">Отмена</button>
              </div>
            </div>
          )}

          {showAddForm && formType && (
            <div className="fixed inset-0 bg-black/30 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl p-6 max-w-md w-full max-h-96 overflow-y-auto">
                <h3 className="text-xl font-bold mb-4">{formType === 'expense' ? '💸 Расход' : '💰 Доход'}</h3>
                
                <input type="text" placeholder="Название" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-2 outline-none" />
                
                <input type="number" placeholder="Сумма" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-2 outline-none" />
                
                {formType === 'expense' && (
                  <select value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-2 outline-none">
                    {categories.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                )}
                
                <select value={formData.wallet} onChange={(e) => setFormData({...formData, wallet: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-2 outline-none">
                  {wallets.map(w => <option key={w.id} value={w.name}>{w.name}</option>)}
                </select>
                
                <input type="date" value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-2 outline-none" />
                
                <textarea placeholder="Комментарий" value={formData.comment} onChange={(e) => setFormData({...formData, comment: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-3 outline-none resize-none" rows="2" />
                
                <div className="flex gap-2">
                  <button onClick={addTransaction} className="flex-1 bg-green-600 text-white py-2 rounded-lg font-semibold">✓ Сохранить</button>
                  <button onClick={() => { setShowAddForm(false); setFormType(null); }} className="flex-1 bg-slate-300 py-2 rounded-lg">✕</button>
                </div>
              </div>
            </div>
          )}

          {/* НАВИГАЦИЯ */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around py-2">
            {[{icon: '📊', tab: 'dashboard'}, {icon: '📜', tab: 'history'}, {icon: '💳', tab: 'wallets'}, {icon: '📈', tab: 'analytics'}].map(item => (
              <button key={item.tab} onClick={() => setActiveTab(item.tab)} className={`flex-1 py-3 text-center text-xl ${activeTab === item.tab ? 'text-blue-600 border-t-2 border-blue-600' : 'text-slate-600'}`}>
                {item.icon}
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<FinanceManager />);
  </script>
</body>
</html>
